<body>

    <div class="janela">
        <div class="header-left">

        <h2>Editar as quantidades de Páginas</h2>

        <div class="card">
            <p>Nome do livro: </p>
            <input type="text" id="ipt_nome">

            <p>Nome do autor: </p>
            <input type="text" id="ipt_autor">

            <p>Total de páginas: </p>
            <input type="text" id="ipt_total">

            <p>Quantidade de páginas lidas: </p>
            <input type="text" id="ipt_lidas">

            <button class="btn-atualizar" onclick="atualizarPaginasLidas()">Atualizar páginas</button>
        </div>
    </div>

</html>

<script>
    let b_usuario = sessionStorage.NOME_USUARIO;

    function atualizarPaginasLidas() {
        let idUsuario = sessionStorage.ID_USUARIO;

        var nomeLivro = (document.getElementById("ipt_nome").value);
        var nomeAutor = (document.getElementById("ipt_autor").value);
        var qtdPaginas = Number(document.getElementById("ipt_total").value);
        var paginasLidas = Number(document.getElementById("ipt_lidas").value);

        if (nomeLivro == "" || nomeAutor == "" || qtdPaginas == "" || paginasLidas == "") {
            alert("Por favor, preencha todos os campos!");
            return;
        }

        console.log(`Enviando: Livro ${nomeLivro}, Autor: ${nomeAutor} ,Total: ${qtdPaginas}, Lidas: ${paginasLidas}`);

        if (qtdPaginas < paginasLidas) {
            alert("Erro: As páginas lidas não podem ser maiores que o total de páginas do livro!");
            return;
        }

        fetch(`/livros/atualizarPaginas`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                paginasLidas: paginasLidas,
                qtdPaginas: qtdPaginas,
                nomeLivro: nomeLivro,
                nomeAutor: nomeAutor,
                idUsuario: idUsuario
            })
        }).then(function (resposta) {

            if (resposta.ok) {
                console.log("Histórico de leitura atualizado com sucesso!");
                alert("Leitura registrada com sucesso!");

            } else if (resposta.status == 404) {
                window.alert("Deu 404!");
            } else {
                throw ("Houve um erro ao tentar realizar a postagem! Código da resposta: " + resposta.status);
            }
        }).catch(function (resposta) {
            console.log(`#ERRO: ${resposta}`);
        });
    }

</script>
