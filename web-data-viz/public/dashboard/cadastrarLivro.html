<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/livro.png" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMV | Dashboards</title>


    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />
    <script src="../js/sessao.js"></script>
    <script src="./../js/alerta.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://kit.fontawesome.com/9f7414eb10.js" crossorigin="anonymous"></script>
</head>


<body>

    <div class="janela">
        <div class="header-left">
            <img src="../assets/imgs/logo-branca.png" alt="">

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="btn-nav">
                <a href="./dashboard.html">
                    <h3>Dashboard</h3>
                </a>
            </div>

            <div class="btn-nav-white">
                <a href="./editar.html">
                    <h3>Editar</h3>
                </a>
            </div>

            <div class="btn-nav">
                <a href="./cadastrarLivro.html">
                    <h3>Cadastrar Livro</h3>
                </a>
            </div>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>

        </div>

    </div>

    <div class="conteudo">
        <h2>Cadastrar um livro</h2>

        <div class="card-cadastrar">
            <p>Nome do livro: </p>
            <input type="text" id="ipt_nome">

            <p>Nome do autor: </p>
            <input type="text" id="ipt_autor">

            <p>Genero do livro: </p>
            <input type="text" id="ipt_genero">

            <p>Nome da editora: </p>
            <input type="text" id="ipt_editora">

            <p>Total de páginas: </p>
            <input type="text" id="ipt_total">

            <button class="btn-cadastrar" onclick="cadatrar()">Cadastrar um livro</button>
        </div>
    </div>

</body>

</html>

<script>
     b_usuario.innerHTML = sessionStorage.NOME_USUARIO;
</script>
