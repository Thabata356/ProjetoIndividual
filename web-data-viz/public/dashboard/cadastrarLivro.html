<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/livro.png" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FMV | Dashboards</title>


    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />
    <script src="../js/sessao.js"></script>
    <script src="./../js/alerta.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>


<body>

    <div class="janela">
        <div class="header-left">
            <img src="../assets/imgs/logo-branca.png" alt="">

            <div class="hello">
                <h3>Olá, <span id="b_usuario"></span>!</h3>
            </div>

            <a href="./dashboard.html">
                <div class="btn-nav">
                    <h3>Dashboard</h3>
                </div>
            </a>

            <a href="./editar.html">
                <div class="btn-nav">
                    <h3>Editar</h3>
                </div>
            </a>

            <a href="./cadastrarLivro.html">
                <div class="btn-nav agora">
                    <h3>Cadastrar Livro</h3>
                </div>
            </a>

            <div class="btn-logout" onclick="limparSessao()">
                <h3>Sair</h3>
            </div>

        </div>

    </div>

    <div class="conteudo">
        <h2>Cadastrar um livro</h2>

        <div class="card-cadastrar">
            <p>Nome do livro: </p>
            <input type="text" id="ipt_nome">

            <p>Nome do autor: </p>
            <input type="text" id="ipt_autor">

            <p>Gênero do livro: </p>
            <input type="text" id="ipt_genero">

            <p>Nome da editora: </p>
            <input type="text" id="ipt_editora">

            <p>Total de páginas: </p>
            <input type="text" id="ipt_total">

            <button class="btn-cadastrar" onclick="cadastrarLivro()">Cadastrar um livro</button>
        </div>
    </div>

</body>

</html>

<script>
    b_usuario.innerHTML= `${sessionStorage.NOME_USUARIO}`;

    function cadastrarLivro() {
        var idUsuario = sessionStorage.ID_USUARIO;
        console.log("ID USUARIO:" + idUsuario);

        var nomeLivro = (document.getElementById("ipt_nome").value);
        var nomeAutor = (document.getElementById("ipt_autor").value);
        var generoLivro = (document.getElementById("ipt_genero").value);
        var editoraLivro = (document.getElementById("ipt_editora").value);
        var qtdPaginas = Number(document.getElementById("ipt_total").value);

        if (nomeLivro == "" || nomeAutor == "" || qtdPaginas == "" || generoLivro == "" || editoraLivro == "") {
            alert("Por favor, preencha todos os campos!");
            return;
        }

        console.log(`Enviando: Livro ${nomeLivro}, Autor: ${nomeAutor}, Genero: ${generoLivro}, Editora: ${editoraLivro}, Total: ${qtdPaginas}, Usuario: ${idUsuario} `);

        fetch(`/livros/cadastrarNovoLivro`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                nomeLivro: nomeLivro,
                nomeAutor: nomeAutor,
                generoLivro: generoLivro,
                editoraLivro: editoraLivro,
                qtdPaginas: qtdPaginas,
                idUsuario: idUsuario
            })
        }).then(function (resposta) {

            if (resposta.ok) {
                console.log("Cadastro de livros feito com sucesso!");

                ipt_nome.value = "";
                ipt_autor.value = "";
                ipt_genero.value = "";
                ipt_editora.value = "";
                ipt_total.value = "";

            } else if (resposta.status == 404) {
                window.alert("Deu 404!");
            } else {
                throw ("Houve um erro ao tentar realizar a o cadstro de um livro! Código da resposta: " + resposta.status);
            }
        }).catch(function (resposta) {
            console.log(`#ERRO: ${resposta}`);
        });
    }
</script>
